name: Deploy to edunovaa-prod

on:
  push:
    branches:
      - Features

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR="/home/deploy/.nvm"
            export PATH="/home/deploy/.nvm/versions/node/v20.20.2/bin:$PATH"
            export PM2=/home/deploy/.nvm/versions/node/v20.20.2/bin/pm2

            cd /var/www/edu-novaa/repo

            echo "--- git pull ---"
            git pull origin Features

            echo "--- backend install ---"
            cd backend && npm install --production && cd ..

            echo "--- frontend install & build ---"
            cd frontend && npm install && npm run build && cd ..

            echo "--- pm2 restart ---"
            $PM2 restart smart-college-backend

            echo "--- app logs (10s) ---"
            sleep 10 && $PM2 logs smart-college-backend --lines 30 --nostream

            echo "✅ Deploy complete"
