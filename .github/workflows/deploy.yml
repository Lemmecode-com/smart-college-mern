name: Deploy to edunovaa-prod

on:
  push:
    branches:
      - Features

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR="/home/deploy/.nvm"
            export PATH="/home/deploy/.nvm/versions/node/v20.20.2/bin:$PATH"
            export PM2=/home/deploy/.nvm/versions/node/v20.20.2/bin/pm2

            cd /var/www/edu-novaa/repo

            echo "--- git sync ---"
            git fetch origin Features
            git reset --hard origin/Features

            echo "--- syncing secrets to .env ---"
            grep -q "^GLITCHTIP_DSN=" backend/.env && sed -i "s|^GLITCHTIP_DSN=.*|GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN }}|" backend/.env || echo "GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN }}" >> backend/.env
            grep -q "^GLITCHTIP_ENABLED=" backend/.env && sed -i "s|^GLITCHTIP_ENABLED=.*|GLITCHTIP_ENABLED=${{ secrets.GLITCHTIP_ENABLED }}|" backend/.env || echo "GLITCHTIP_ENABLED=${{ secrets.GLITCHTIP_ENABLED }}" >> backend/.env
            grep -q "^VITE_GLITCHTIP_DSN=" frontend/.env.production && sed -i "s|^VITE_GLITCHTIP_DSN=.*|VITE_GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN_FRONTEND }}|" frontend/.env.production || echo "VITE_GLITCHTIP_DSN=${{ secrets.GLITCHTIP_DSN_FRONTEND }}" >> frontend/.env.production

            echo "--- backend install ---"
            cd backend && npm ci --omit=dev && cd ..

            echo "--- frontend install & build ---"
            cd frontend && npm ci && npm run build && cd ..

            echo "--- pm2 reload ---"
            $PM2 reload smart-college-backend

            echo "--- app logs (10s) ---"
            sleep 10 && $PM2 logs smart-college-backend --lines 30 --nostream

            echo "✅ Deploy complete"
